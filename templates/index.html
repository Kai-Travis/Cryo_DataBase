<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="buttons.css">
    </head>
    <header>
        <title>Cryo Inventory</title>
    </header>
    <body>
        <header>
            <section class="head_div">
                <h1>Cryo Inventory System</h1>
            </section>

        </header>

        <main class="page_layout">
            
            <div>
                <div class="freezer-div">
                  <button class="freezer_button selected">Freezer 1</button>
                  <button class="freezer_button">Freezer 2</button>
                </div>

                <section>
                    <div class="rack_tabs">
                        <button class="rack-button" id="rack1">Rack 1</button>
                        <button class="rack-button" id="rack2">Rack 2</button>
                        <button class="rack-button" id="rack3">Rack 3</button>
                        <button class="rack-button" id="rack4">Rack 4</button>
                    </div>
                    <div class="rack-view">
                        <div class ="box-buttons-div">
                            <button clas="box-button" id="box1">Box 1</button>
                            <button clas="box-button" id="box2">Box 2</button>
                            <button clas="box-button" id="box3">Box 3</button>
                            <button clas="box-button" id="box4">Box 4</button>
                            <button clas="box-button" id="box5">Box 5</button>
                        </div>

                        <div class="table">
                            <button class="box-arrow left-arrow">
                                ◀
                            </button>
                            <div class="box-grid">

                            </div>
                            <button class="box-arrow right-arrow">
                                ▶
                            </button>
                        </div>
                    </div>
                </section>
            </div>

            <aside>
                <div>
                    <h2>Cell index</h2>
                </div>
                <div class="search_container">
                    <input type="text" placeholder="Search">
                    <button>Search</button>
                </div>

                <div class="cell_index">
                    <ul>
                        {% for cell in cell_lines %}
                            <li>{{ cell[1] }}</li>
                        {% endfor %}
                    </ul>
                </div>

                <div class="cell_summary">

                </div>
            </aside>
        </main>
    </body>
</html>
